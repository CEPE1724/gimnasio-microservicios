services:

  postgres-keycloak-gym:
    image: postgres:16
    container_name: postgres-keycloak-gym
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak-gym-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gym-network

  keycloak-gym:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak-gym
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak-gym:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass

      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      KC_HOSTNAME: http://localhost:8280
    ports:
      - "8280:8080"
    depends_on:
      postgres-keycloak-gym:
        condition: service_healthy
    networks:
      - gym-network

  postgres-gym:
    image: postgres:16
    container_name: postgres-gym
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5434:5432"
    volumes:
      - gym-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d gym_db"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gym-network

  class-booking-service:
    build:
      context: ./class-booking-service
      dockerfile: Dockerfile
    container_name: class-booking-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-gym:5432/gym_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8280/realms/gym-system
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak-gym:8080/realms/gym-system/protocol/openid-connect/certs
    depends_on:
      postgres-gym:
        condition: service_healthy
      keycloak-gym:
        condition: service_started
    networks:
      - gym-network

  nginx-gym:
    image: nginx:1.27-alpine
    container_name: nginx-gateway-gym
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - class-booking-service
    networks:
      - gym-network

volumes:
  keycloak-gym-postgres-data:
  gym-postgres-data:

networks:
  gym-network:
    driver: bridge
